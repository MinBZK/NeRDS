name: Auto-translate Dutch content to English

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**/*.md'
      - '!docs/**/*.en.md'
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force translate all files (even if .en.md exists)'
        required: false
        default: false
        type: boolean

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run auto-translation
      env:
        TRANSLATION_METHOD: ${{ vars.TRANSLATION_METHOD || 'argos' }}
        LIBRETRANSLATE_URL: ${{ vars.LIBRETRANSLATE_URL }}
      run: |
        cd scripts
        python auto_translate.py

    - name: Check for changes
      id: changes
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/**/*.en.md
        git commit -m "🤖 Auto-translate Dutch content to English

        🤖 Generated with [Claude Code](https://claude.ai/code)

        Co-Authored-By: Claude <noreply@anthropic.com>"
        git push

    - name: Create summary
      if: steps.changes.outputs.changes == 'true'
      run: |
        echo "## 🌍 Translation Summary" >> $GITHUB_STEP_SUMMARY
        echo "Successfully translated Dutch content to English!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### New English files created:" >> $GITHUB_STEP_SUMMARY
        git diff --name-only HEAD~1 HEAD | grep '\.en\.md$' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY || echo "- No new files" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Translation Service Used:" >> $GITHUB_STEP_SUMMARY
        if [ "$TRANSLATION_METHOD" = "argos" ]; then
          echo "- 🔒 Argos Translate (fully offline, privacy-safe)" >> $GITHUB_STEP_SUMMARY
        elif [ "$TRANSLATION_METHOD" = "transformers" ]; then
          echo "- 🔒 Transformers (local AI model, privacy-safe)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- 🔒 LibreTranslate (open-source, privacy-safe)" >> $GITHUB_STEP_SUMMARY
        fi
